replicaCount: 2

image:
  repository: registry.example.com/zest/zest-sso-server
  tag: "1.0.0-SNAPSHOT"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: true
  className: nginx
  host: sso.example.com
  tlsSecretName: zest-sso-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

issuer: https://sso.example.com

mysql:
  host: mysql.database.svc.cluster.local
  port: 3306
  database: zest_sso
  username: zest_sso
  existingSecret: zest-sso-mysql
  passwordKey: password

redis:
  host: redis.database.svc.cluster.local
  port: 6379
  existingSecret: zest-sso-redis
  passwordKey: password

jwt:
  existingSecret: zest-sso-jwt
  privateKeyKey: jwt-private.pem
  publicKeyKey: jwt-public.pem
  keyId: zest-sso-prod-key-1

resources:
  requests:
    cpu: 500m
    memory: 768Mi
  limits:
    cpu: "2"
    memory: 2Gi

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness

env:
  SPRING_PROFILES_ACTIVE: prod
  ZEST_SSO_SECURITY_CORS_ALLOWED_ORIGINS: "https://app.example.com,https://flow.example.com"

# 可选模块（对应 zest.sso.modules.*，通过环境变量覆盖）
modules:
  federation: true
  scim: true
  webauthn: true
  webhooks: false
  alerts: false
  smsMfa: false
  wecomFederation: false
  clientOnboardingWizard: true

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCpuUtilization: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1
