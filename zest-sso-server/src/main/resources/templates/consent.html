<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权确认 - ZestSSO</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; margin: 0; padding: 40px 16px; }
        .card { max-width: 520px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 12px 40px rgba(0,0,0,.08); }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { color: #666; line-height: 1.6; }
        ul { padding-left: 20px; color: #333; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .approve { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .deny { background: #f0f0f0; color: #333; }
    </style>
</head>
<body>
<div class="card">
    <h1>授权确认</h1>
    <p>
        应用 <strong th:text="${clientName}">client</strong> 请求以
        <strong th:text="${principalName}">user</strong> 的身份访问以下权限：
    </p>
    <ul>
        <li th:each="item : ${scopes}" th:text="${item}">scope</li>
    </ul>
    <form class="actions" th:action="@{/oauth2/authorize}" method="post">
        <input type="hidden" name="client_id" th:value="${clientId}">
        <input type="hidden" name="state" th:value="${state}">
        <input type="hidden" name="scope" th:value="${scopeParam}">
        <button class="deny" type="submit" name="user_oauth_approval" value="false">拒绝</button>
        <button class="approve" type="submit" name="user_oauth_approval" value="true">同意授权</button>
    </form>
</div>
</body>
</html>
