<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - ZestSSO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card { background: #fff; border-radius: 12px; padding: 40px; width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        h1 { font-size: 22px; color: #333; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        .btn { width: 100%; padding: 14px; background: #667eea; color: #fff; border: none;
            border-radius: 8px; font-size: 16px; cursor: pointer; }
        .msg { margin-top: 16px; text-align: center; font-size: 14px; display: none; }
        .ok { color: #2e7d32; }
        .err { color: #c62828; }
        .link { display: block; text-align: center; margin-top: 16px; color: #667eea; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>设置新密码</h1>
    <form id="resetForm">
        <input type="hidden" id="token" th:value="${token}">
        <div class="form-group">
            <label for="newPassword">新密码</label>
            <input type="password" id="newPassword" required minlength="8" placeholder="至少 8 位，含大小写与数字">
        </div>
        <div class="form-group">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" required>
        </div>
        <button type="submit" class="btn">确认重置</button>
    </form>
    <div id="message" class="msg"></div>
    <a href="/login" class="link">返回登录</a>
</div>
<script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('message');
        const token = document.getElementById('token').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        msg.style.display = 'none';
        msg.className = 'msg';
        if (newPassword !== confirmPassword) {
            msg.textContent = '两次输入的密码不一致';
            msg.classList.add('err');
            msg.style.display = 'block';
            return;
        }
        try {
            const res = await fetch('/api/public/password/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();
            if (data.code === 0) {
                msg.textContent = '密码已重置，即将跳转登录页…';
                msg.classList.add('ok');
                msg.style.display = 'block';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                msg.textContent = data.message || '重置失败';
                msg.classList.add('err');
                msg.style.display = 'block';
            }
        } catch (err) {
            msg.textContent = '网络错误，请稍后重试';
            msg.classList.add('err');
            msg.style.display = 'block';
        }
    });
</script>
</body>
</html>
