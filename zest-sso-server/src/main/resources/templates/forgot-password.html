<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - ZestSSO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card { background: #fff; border-radius: 12px; padding: 40px; width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; text-align: center; }
        p { color: #888; font-size: 14px; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        .btn { width: 100%; padding: 14px; background: #667eea; color: #fff; border: none;
            border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn:hover { background: #5a6fd6; }
        .msg { margin-top: 16px; text-align: center; font-size: 14px; color: #2e7d32; display: none; }
        .err { color: #c62828; }
        .link { display: block; text-align: center; margin-top: 16px; color: #667eea; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>忘记密码</h1>
    <p>输入用户名或邮箱，我们将发送重置链接（开发环境请查看服务端日志）</p>
    <form id="forgotForm">
        <div class="form-group">
            <label for="usernameOrEmail">用户名 / 邮箱</label>
            <input type="text" id="usernameOrEmail" name="usernameOrEmail" required placeholder="admin 或 admin@zest.local">
        </div>
        <button type="submit" class="btn">发送重置链接</button>
    </form>
    <div id="message" class="msg"></div>
    <a href="/login" class="link">返回登录</a>
</div>
<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('message');
        const usernameOrEmail = document.getElementById('usernameOrEmail').value.trim();
        msg.style.display = 'none';
        msg.classList.remove('err');
        try {
            const res = await fetch('/api/public/password/forgot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usernameOrEmail })
            });
            const data = await res.json();
            if (data.code === 0) {
                msg.textContent = '若账号存在，重置链接已发送（开发环境请查看服务端日志）';
                msg.style.display = 'block';
            } else {
                msg.textContent = data.message || '请求失败';
                msg.classList.add('err');
                msg.style.display = 'block';
            }
        } catch (err) {
            msg.textContent = '网络错误，请稍后重试';
            msg.classList.add('err');
            msg.style.display = 'block';
        }
    });
</script>
</body>
</html>
