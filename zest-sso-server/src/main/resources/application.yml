server:
  port: 9000
  servlet:
    context-path: /
  forward-headers-strategy: framework

spring:
  application:
    name: zest-sso
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zest_sso?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: ZestSsoHikariCP

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

  session:
    store-type: redis
    redis:
      namespace: zest-sso:session
      flush-mode: on_save
    timeout: 30m

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

zest:
  sso:
    issuer: http://localhost:9000
    jwt:
      key-id: zest-sso-key-1
      private-key-path:
      public-key-path:
      auto-generate-dir: ./.local/keys
    audit:
      archive-enabled: true
      retention-days: 180
      archive-cron: "0 0 3 * * ?"
    backchannel:
      max-retries: 3
      retry-delay-seconds: 60
    webhooks:
      enabled: false
      signing-secret:
      endpoints: []
      max-retries: 5
      retry-delay-seconds: 30
      retry-scan-ms: 30000
      events:
        - LOGIN_SUCCESS
        - LOGIN_FAILURE
        - LOGOUT
        - USER_DISABLE
    risk:
      step-up-on-new-ip: true
      known-ip-ttl-days: 90
    governance:
      stale-account-disable-enabled: true
      stale-account-days: 90
      stale-account-cron: "0 30 2 * * ?"
    branding:
      login-title: ZestSSO
      login-subtitle: 统一身份认证
      logo-url:
      primary-color: "#1677ff"
      default-locale: zh-CN
    jwt-rotation:
      retired-keys-in-jwks: 1
    security:
      login-rate-limit: 20
      login-rate-window-seconds: 60
      cors-allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:8080,http://localhost:8081
      logout-redirect-hosts: localhost,127.0.0.1,zest.wang,zestflow.cn
    bootstrap:
      reset-default-password: true
    token:
      access-token-ttl: 3600
      refresh-token-ttl: 86400
      id-token-ttl: 3600
    mail:
      enabled: false
      from: noreply@zest.local
      reset-subject: ZestSSO 密码重置
    password-reset:
      token-ttl-minutes: 30
      public-base-url: http://localhost:9000
    webauthn:
      enabled: true
      rp-id: localhost
      rp-name: ZestSSO
      origins: http://localhost:9000,http://localhost:5173,http://localhost:5174,http://localhost:5175
    modules:
      federation: true
      scim: true
      webauthn: true
      webhooks: false
      alerts: false
      sms-mfa: false
      wecom-federation: false
      client-onboarding-wizard: true
    mfa:
      step-up-priority: sms,email
      channels:
        totp:
          enabled: true
        email:
          enabled: true
        aliyun-sms:
          enabled: false
        tencent-sms:
          enabled: false
    alerts:
      enabled: false
      channels: []

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    cn.zest.sso: INFO
    org.springframework.security: INFO
