# 本地开发：本机 MySQL（默认 root/123456）+ Redis
server:
  port: 9000

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zest_sso?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: localhost
      port: 6379

zest:
  sso:
    issuer: http://localhost:9000
    test:
      backchannel-receiver-enabled: true
    risk:
      step-up-on-new-ip: false
    security:
      # dev 下 SecurityConfig 已对 localhost / 127.0.0.1 任意端口放行；此处供文档与非 pattern 场景参考
      cors-allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5180,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:5180,http://localhost:8080,http://localhost:8088

logging:
  level:
    cn.zest.sso: DEBUG
