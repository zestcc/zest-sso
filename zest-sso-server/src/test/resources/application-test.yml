spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zest_sso_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration

  session:
    store-type: none

zest:
  sso:
    issuer: http://localhost:9000
    test:
      backchannel-receiver-enabled: true
    security:
      corsAllowedOrigins:
        - http://localhost:5173
        - http://localhost:9999
    webauthn:
      origins:
        - http://localhost:5173
    risk:
      step-up-on-new-ip: false
